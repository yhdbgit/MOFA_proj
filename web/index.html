<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MOFAapp의 현재 AI 상담을 읽기 전용으로 확인하는 로컬 행정 포털"
    />
    <title>영사콜센터 행정 포털</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">⏱</div>
          <div>
            <h1>골든타임 확보 시스템</h1>
            <p>재외국민 초기대응 행정포털 · 로컬 테스트</p>
          </div>
        </div>

        <div class="topbar-status">
          <div class="metric">
            누적 상담 <strong id="activeConversationCount">0</strong>건
          </div>
          <div
            id="connectionBadge"
            class="connection-badge checking"
            role="status"
            aria-live="polite"
          >
            <span class="connection-dot" aria-hidden="true"></span>
            <span id="connectionLabel">서버 확인 중</span>
          </div>
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar" aria-label="실시간 상담 목록">
          <div class="sidebar-header">
            <h2>실시간 상담 접수</h2>
            <p id="conversationCountText">현재 진행 중인 상담이 없습니다.</p>
          </div>

          <div id="conversationList" class="conversation-list">
            <div class="sidebar-empty">
              <span aria-hidden="true">📭</span>
              <p>민원인이 채팅을 시작하면<br />현재 상담이 표시됩니다.</p>
            </div>
          </div>
        </aside>

        <main class="chat-panel">
          <header class="chat-header">
            <div>
              <h2 id="chatTitle">상담을 기다리는 중입니다</h2>
              <p id="chatSubtitle">왼쪽 목록에서 상담을 선택하면 대화가 표시됩니다.</p>
            </div>
            <div class="chat-header-actions">
              <span id="messageCountBadge" class="message-count" hidden></span>
              <button
                id="generateDocumentButton"
                class="document-generate-button"
                type="button"
                disabled
              >
                📄 공문 확인
              </button>
              <button
                id="manualGenerateDocumentButton"
                class="document-manual-button"
                type="button"
                disabled
              >
                공문 수동 생성
              </button>
            </div>
          </header>

          <section
            id="messageList"
            class="message-list"
            aria-label="민원인과 담당자의 대화"
            aria-live="polite"
          >
            <div class="chat-empty">
              <div class="empty-icon" aria-hidden="true">💬</div>
              <h3>표시할 상담이 없습니다</h3>
              <p>
                모바일 앱에서 메시지를 보내면<br />이 화면에 최신 대화가 표시됩니다.
              </p>
            </div>
          </section>

          <footer class="staff-composer" aria-label="담당자 답변 입력">
            <label class="staff-composer-label" for="staffReplyInput">
              담당자 답변
            </label>
            <div class="staff-composer-row">
              <textarea
                id="staffReplyInput"
                class="staff-reply-input"
                rows="3"
                maxlength="4000"
                placeholder="민원인에게 보낼 답변을 입력하세요."
              ></textarea>
              <button
                id="sendStaffMessageButton"
                class="staff-send-button"
                type="button"
                disabled
              >
                전송
              </button>
            </div>
            <p id="staffReplyStatus" class="staff-reply-status" role="status" aria-live="polite"></p>
          </footer>
        </main>

        <aside class="assistant-panel" aria-label="답변 어시스턴트">
          <header class="assistant-panel-header">
            <div>
              <h2>답변 어시스턴트</h2>
              <p id="assistantPanelMeta">상담 선택 대기</p>
            </div>
            <span id="assistantStatusBadge" class="assistant-status-badge idle">
              대기
            </span>
          </header>

          <div id="assistantPanelContent" class="assistant-panel-content"></div>

          <footer class="assistant-panel-footer">
            <button
              id="quoteAssistantReplyButton"
              class="quote-assistant-button"
              type="button"
              disabled
            >
              인용
            </button>
          </footer>
        </aside>

        <aside
          id="documentPanel"
          class="document-panel"
          aria-label="공문 초안 편집"
          aria-hidden="true"
        >
          <header class="document-panel-header">
            <h2>📄 공문 초안</h2>
            <button
              id="closeDocumentPanelButton"
              class="document-close-button"
              type="button"
              aria-label="공문 초안 닫기"
            >
              ×
            </button>
          </header>

          <div id="documentPanelContent" class="document-panel-content"></div>

          <footer class="document-panel-footer">
            <p id="documentStatusText" role="status" aria-live="polite"></p>
            <button
              id="saveDocumentButton"
              class="document-save-button"
              type="button"
              hidden
            >
              임시 저장
            </button>
            <button
              id="approveDocumentButton"
              class="document-approve-button"
              type="button"
              hidden
            >
              승인
            </button>
            <button
              id="downloadDocumentButton"
              class="document-download-button"
              type="button"
              hidden
            >
              PDF 다운로드
            </button>
          </footer>
        </aside>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
