spring:
  datasource:
    url: jdbc:h2:mem:mofa-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

mofa:
  ai-agent:
    base-url: http://localhost:8000
  events:
    redis-channel: mofa.events
    redis-listener-enabled: false
