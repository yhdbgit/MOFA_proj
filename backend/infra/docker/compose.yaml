services:
  postgres:
    image: postgres:16-alpine
    container_name: mofa-postgres
    environment:
      POSTGRES_DB: mofa
      POSTGRES_USER: mofa
      POSTGRES_PASSWORD: mofa-local-password
    ports:
      - "5432:5432"
    volumes:
      - mofa-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mofa -d mofa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mofa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mofa-postgres-data:
